spring:
  application:
    name: itoms-backend
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/itoms?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

jwt:
  secret: c3ByaW5nLWJvb3Qtand0LXNlY3JldC1rZXktdGVzdA==
  expiration: 7200000

ai:
  api:
    url: https://ai.example.com/api
    access-key: YOUR_ACCESS_KEY
    secret-key: YOUR_SECRET_KEY
    timeout: 5000
    enabled: true
